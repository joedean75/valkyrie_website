# Netlify configuration for the Corvus Industries static marketing site.
# Assumes this file sits at the repo ROOT alongside index.html — i.e. the dedicated
# website repo created from the contents of valkyrie's `website/` folder.
# No build step: it's plain static HTML/CSS/JS.

[build]
  publish = "."
  command = ""

# Sensible security headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long-cache static assets (they're versioned by content changes).
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"
